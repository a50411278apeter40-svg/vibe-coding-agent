# Render Blueprint for this app (https://render.com/docs/blueprint-spec).
#
# This project no longer depends on EdgeOne's own "agents" framework or its
# sandbox runtime -- every previously EdgeOne-specific endpoint (/chat,
# /file, /projectDetail, /download, /auth/login, /auth/signup,
# /projects/list) is now a plain Next.js Route Handler (see app/**/route.ts),
# so it runs as an ordinary Node web service anywhere, including here.
#
# One-time setup after connecting this repo on Render:
#   1. In the Render dashboard, set the environment variables listed below
#      under this service's Environment tab (they're marked sync: false so
#      Render will prompt for them instead of committing secrets to git).
#   2. Run agents/_lib/conversations-schema.sql (plus the existing
#      edge-functions/_lib/users-schema.sql and _lib/projects-schema.sql if
#      not already applied) once in your Supabase project's SQL editor.
#   3. Deploy. Render will run `npm install --include=dev && npm run build`
#      then `npm run start`, which binds to the $PORT Render provides.
#
# IMPORTANT: do NOT set NODE_ENV=production as a build-time env var here.
# Render (and npm) treat that as a signal to skip devDependencies during
# `npm install`, which breaks the build because Tailwind's PostCSS plugin
# (@tailwindcss/postcss) and TypeScript live in devDependencies. The
# `--include=dev` flag below is a second safety net for the same reason.
# Next.js sets its own NODE_ENV internally for build vs. start, so you
# don't need to (and shouldn't) set it yourself.
#
# PLAYWRIGHT/CHROMIUM: buildCommand also runs
# `npx playwright install --with-deps chromium`, which both downloads the
# Chromium binary and apt-get-installs its required OS shared libraries
# (libnspr4, libnss3, ...). Render's native Node build environment permits
# apt-get during the build step, so this works without switching to a Docker
# runtime. PIXAL2.0's browser_* tools (agents/tools/_browserTools.ts) launch
# this Chromium directly in the running web service and keep one persistent
# session per conversation, auto-closing it after 10 minutes of inactivity to
# free RAM.

services:
  - type: web
    name: pixal2-web
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx playwright install --with-deps chromium && npm run build
    startCommand: npm run start
    envVars:
      # AI provider key (free tier): Gemma 4 via the Gemini API.
      - key: GEMINI_API_KEY
        sync: false
      # Daytona sandbox (free, no credit card) -- actual code-execution sandbox.
      - key: DAYTONA_API_KEY
        sync: false
      # Supabase Postgres -- users, projects, and conversations/messages
      # (chat history + project-state metadata, replacing EdgeOne's
      # context.store; see agents/_contextStore.ts).
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
